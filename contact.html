<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | EasyVariants</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        .contact-section {
            padding: 12rem 0 8rem;
            min-height: 100vh;
            background: var(--bg-main);
            position: relative;
            overflow: hidden;
        }

        .contact-container {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 2rem;
            padding: 4rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        }

        .contact-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .contact-header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .contact-form {
            display: grid;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .form-group input, 
        .form-group textarea,
        .form-group select {
            padding: 1rem;
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 0.75rem;
            font-family: inherit;
            transition: all 0.2s ease;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            margin-top: 1rem;
            width: 100%;
        }

        @media (max-width: 768px) {
            .contact-section {
                padding: 8rem 1rem 4rem;
            }
            .contact-card {
                padding: 2rem;
            }
            .contact-header h1 {
                font-size: 2.25rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar glossy">
        <div class="container navbar-inner">
            <div class="logo">
                <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 0.75rem;">
                    <img src="logo-removebg-preview.png" alt="EasyVariants Logo" class="logo-img">
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#features">Features</a></li>
                <li><a href="index.html#how-it-works">Process</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="index.html#faq">FAQ</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section class="contact-section">
            <!-- Background Blobs -->
            <div class="blob-container">
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
            </div>

            <div class="contact-container">
                <div class="contact-card">
                    <div class="contact-header">
                        <h1>Get Your Custom Variants</h1>
                        <p>Tell us about your project and we'll help you scale your design production.</p>
                    </div>
                    
                    <form class="contact-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Work Email</label>
                            <input type="email" id="email" placeholder="john@company.com" required>
                        </div>
                        <div class="form-group">
                            <label for="interest">I'm interested in</label>
                            <select id="interest">
                                <option>Generating 100+ Variants</option>
                                <option>Exporting Custom Designs</option>
                                <option>Enterprise Integration</option>
                                <option>General Inquiry</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">Project Details</label>
                            <textarea id="message" rows="4" placeholder="How can we help you scale?"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary btn-submit">Send Inquiry</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom" style="text-align: center; border: none; padding-top: 0;">
                &copy; 2026 EasyVariants. All rights reserved.
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
